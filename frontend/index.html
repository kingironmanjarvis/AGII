<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday — Autonomous AI Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"><\/script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--surface3:#22222f;--border:#2a2a3a;--accent:#7c3aed;--accent2:#a855f7;--glow:rgba(124,58,237,0.3);--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a7a;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;--r:12px;--sb:280px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;font-size:14px;display:flex}
#sidebar{width:var(--sb);min-width:var(--sb);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .3s,min-width .3s;overflow:hidden}
#sidebar.collapsed{width:0;min-width:0}
.sbar-head{padding:16px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 0 24px var(--glow)}
.logo-text{font-size:17px;font-weight:700}.logo-sub{font-size:9px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase}
.new-btn{margin:10px 10px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;width:calc(100% - 20px);box-shadow:0 4px 16px var(--glow);transition:all .2s}
.new-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--glow)}
.stabs{display:flex;border-top:1px solid var(--border);padding:6px;gap:3px}
.stab{flex:1;padding:6px 2px;border-radius:8px;border:none;background:none;color:var(--text2);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.stab:hover{background:var(--surface2);color:var(--text)}.stab.active{background:var(--surface3);color:var(--accent2)}
.stab .si{font-size:15px}
.sec-label{padding:10px 10px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden;padding:4px 6px}
.panel.active{display:flex}
.s-list{flex:1;overflow-y:auto;padding:2px}
.si-item{padding:9px 8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:all .15s}
.si-item:hover{background:var(--surface2)}.si-item.active{background:var(--surface3)}
.si-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.si-time{font-size:10px;color:var(--text3);white-space:nowrap}
.si-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:1px 4px}
.si-item:hover .si-del{opacity:1}
.p-item{background:var(--surface2);border-radius:9px;padding:9px 10px;margin-bottom:5px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.p-item-info{flex:1;min-width:0}.p-item-name{font-size:12px;font-weight:600;color:var(--text)}
.p-item-desc{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-g{background:rgba(16,185,129,.15);color:var(--green)}.b-p{background:rgba(168,85,247,.15);color:var(--accent2)}.b-y{background:rgba(245,158,11,.15);color:var(--yellow)}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px}
.del-btn:hover{color:var(--red)}
.empty-st{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:11px;gap:5px;text-align:center}
.empty-st .ei{font-size:26px;opacity:.35}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0}
#toggle-sb{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;border-radius:6px;transition:all .15s}
#toggle-sb:hover{color:var(--text);background:var(--surface2)}
.h-title{font-size:14px;font-weight:600;flex:1}
.h-title span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.model-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:8px;cursor:pointer;outline:none}
.model-sel:focus{border-color:var(--accent)}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.stats-b{display:flex;gap:14px;padding:5px 18px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);flex-shrink:0;align-items:center}
.sv{color:var(--text2);font-weight:600}
#messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;gap:28px;overflow-y:auto}
.w-logo{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;color:#fff;box-shadow:0 0 60px var(--glow);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 40px var(--glow)}50%{box-shadow:0 0 80px rgba(124,58,237,.5)}}
.w-title{font-size:30px;font-weight:800;text-align:center}
.w-title span{background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.w-sub{font-size:14px;color:var(--text2);text-align:center;max-width:480px;line-height:1.6}
.cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:600px;width:100%}
.cap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:5px}
.cap-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-2px)}
.cap-icon{font-size:20px}.cap-label{font-size:12px;font-weight:600}.cap-desc{font-size:11px;color:var(--text2);line-height:1.4}
.msg{display:flex;gap:10px;align-items:flex-start;animation:mi .25s ease-out}
@keyframes mi{from{opacity:0;transform:translateY(8px)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.msg.user .av{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.msg.assistant .av{background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 14px var(--glow);font-size:13px;font-weight:800;color:#fff}
.bubble{max-width:75%;padding:11px 14px;border-radius:15px;line-height:1.6;font-size:14px}
.msg.user .bubble{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--surface);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble h1,.bubble h2,.bubble h3{margin:10px 0 5px;font-weight:700}
.bubble h1{font-size:17px}.bubble h2{font-size:15px}.bubble h3{font-size:13px}
.bubble p{margin:5px 0}.bubble ul,.bubble ol{margin:5px 0;padding-left:18px}.bubble li{margin:2px 0}
.bubble strong{color:var(--accent2);font-weight:600}.bubble em{color:var(--text2)}
.bubble code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:"JetBrains Mono","Fira Code",monospace;font-size:12px;color:#c084fc}
.bubble pre{background:#0d0d14;border:1px solid var(--border);border-radius:9px;padding:12px;margin:7px 0;overflow-x:auto}
.bubble pre code{background:none;border:none;padding:0;color:var(--text);font-size:12px;line-height:1.6}
.bubble table{width:100%;border-collapse:collapse;margin:7px 0;font-size:12px}
.bubble th{background:var(--surface2);padding:6px 9px;text-align:left;border:1px solid var(--border);font-weight:600}
.bubble td{padding:5px 9px;border:1px solid var(--border)}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text2);margin:7px 0}
.bubble a{color:var(--cyan);text-decoration:none}.bubble a:hover{text-decoration:underline}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.t-ind{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin:3px 0;font-size:11.5px;color:var(--text2);animation:tp 1.5s ease-in-out infinite}
@keyframes tp{0%,100%{border-color:var(--border)}50%{border-color:var(--accent)}}
.t-ind.done{animation:none;border-color:var(--green);opacity:.6}
.t-name{color:var(--accent2);font-weight:600}
.typing{display:flex;align-items:center;gap:3px;padding:3px 0}
.td{width:7px;height:7px;background:var(--accent2);border-radius:50%;animation:b 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#input-area{padding:14px 18px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.inp-wrap{background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;transition:border-color .2s;overflow:hidden}
.inp-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.inp-left{display:flex;align-items:center;padding:0 2px 0 10px;gap:1px}
.iib{background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 5px;border-radius:6px;font-size:15px;transition:all .15s;display:flex;align-items:center}
.iib:hover{color:var(--accent2);background:var(--surface3)}
#mi{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;resize:none;max-height:160px;min-height:42px;padding:10px 6px;font-family:inherit;line-height:1.5}
#mi::placeholder{color:var(--text3)}
#sb{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;cursor:pointer;padding:9px 12px;margin:5px;border-radius:9px;font-size:17px;transition:all .2s;align-self:flex-end;display:flex;align-items:center;justify-content:center;min-width:40px;height:40px}
#sb:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 18px var(--glow)}
#sb:disabled{opacity:.4;cursor:not-allowed}
.hints{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.hc{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.hc:hover{border-color:var(--accent);color:var(--accent2);background:var(--surface3)}
.drop-ov{position:fixed;inset:0;background:rgba(124,58,237,.15);border:3px dashed var(--accent);border-radius:18px;display:flex;align-items:center;justify-content:center;z-index:1000;pointer-events:none;opacity:0;transition:opacity .2s;font-size:22px;color:var(--accent2);font-weight:700}
.drop-ov.active{opacity:1}
#toast{position:fixed;bottom:85px;right:18px;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:9px;font-size:12.5px;z-index:1000;opacity:0;transition:opacity .3s;max-width:280px}
#toast.show{opacity:1}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
@media(max-width:700px){#sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .3s;width:85% !important;min-width:unset !important}#sidebar.open{transform:translateX(0)}.cap-grid{grid-template-columns:repeat(2,1fr)}.bubble{max-width:90%}}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sbar-head">
    <div class="logo">F</div>
    <div><div class="logo-text">Friday</div><div class="logo-sub">Autonomous AI</div></div>
  </div>
  <button class="new-btn" onclick="newSession()">✦ New Conversation</button>
  <div class="stabs">
    <button class="stab active" id="tab-chats" onclick="switchTab('chats')"><span class="si">💬</span>Chats</button>
    <button class="stab" id="tab-memory" onclick="switchTab('memory')"><span class="si">🧠</span>Memory</button>
    <button class="stab" id="tab-skills" onclick="switchTab('skills')"><span class="si">🛠️</span>Skills</button>
    <button class="stab" id="tab-auto" onclick="switchTab('auto')"><span class="si">⚡</span>Auto</button>
  </div>
  <div class="panel active" id="panel-chats"><div class="sec-label">Conversations</div><div class="s-list" id="session-list"></div></div>
  <div class="panel" id="panel-memory"><div class="sec-label">Long-term Memory</div><div id="memory-list" class="s-list"></div></div>
  <div class="panel" id="panel-skills"><div class="sec-label">Saved Skills</div><div id="skills-list" class="s-list"></div></div>
  <div class="panel" id="panel-auto"><div class="sec-label">Automations</div><div id="auto-list" class="s-list"></div></div>
</div>
<div id="main">
  <div id="hdr">
    <button id="toggle-sb" onclick="toggleSidebar()">☰</button>
    <div class="h-title">Friday <span id="session-label">New Conversation</span></div>
    <select class="model-sel" id="model-sel">
      <option value="llama-3.3-70b-versatile">LLaMA 3.3 70B</option>
      <option value="llama-3.1-8b-instant">LLaMA 3.1 8B ⚡</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      <option value="gemma2-9b-it">Gemma 2 9B</option>
      <option value="llama-3.3-70b-specdec">SpecDec 🚀</option>
      <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 🧠</option>
    </select>
    <div class="s-dot" id="s-dot"></div>
  </div>
  <div class="stats-b">
    <span>🟢 <span class="sv" id="s-status">Online</span></span>
    <span>💬 <span class="sv" id="s-msgs">0</span> msgs</span>
    <span>🔧 <span class="sv" id="s-tools">0</span> tools</span>
    <span>🧠 <span class="sv" id="s-mem">0</span> memories</span>
    <span>🛠️ <span class="sv" id="s-skills">0</span> skills</span>
  </div>
  <div id="messages" style="display:none"></div>
  <div id="welcome">
    <div class="w-logo">F</div>
    <div><div class="w-title">Meet <span>Friday</span></div><div class="w-sub">Your autonomous AI — real-time web search, persistent memory, code execution, skills engine, automations, and deep multi-step reasoning.</div></div>
    <div class="cap-grid">
      <div class="cap-card" onclick="qp('Search the web: latest AI breakthroughs this week')"><div class="cap-icon">🌐</div><div class="cap-label">Web Search</div><div class="cap-desc">Real-time info & research</div></div>
      <div class="cap-card" onclick="qp('Execute JS code: generate first 20 fibonacci numbers and return them')"><div class="cap-icon">⚡</div><div class="cap-label">Code Execution</div><div class="cap-desc">Run JS, process data</div></div>
      <div class="cap-card" onclick="qp('Remember that my name is Alex and I am building an AI startup')"><div class="cap-icon">🧠</div><div class="cap-label">Persistent Memory</div><div class="cap-desc">Remembers you forever</div></div>
      <div class="cap-card" onclick="qp('Create a skill called getWeather that fetches current weather for a given city')"><div class="cap-icon">🛠️</div><div class="cap-label">Skills Engine</div><div class="cap-desc">Build reusable automations</div></div>
      <div class="cap-card" onclick="qp('Calculate compound interest: $50,000 at 8% annual rate for 30 years compounding monthly')"><div class="cap-icon">🧮</div><div class="cap-label">Computation</div><div class="cap-desc">Precise math & analysis</div></div>
      <div class="cap-card" onclick="qp('Deep reasoning: What will be the biggest technological disruption in the next 10 years? Think step by step.')"><div class="cap-icon">🔬</div><div class="cap-label">Deep Reasoning</div><div class="cap-desc">Chain-of-thought thinking</div></div>
    </div>
  </div>
  <div id="input-area">
    <div class="inp-wrap">
      <div class="inp-left">
        <label class="iib" for="file-inp" title="Upload file">📎</label>
        <input type="file" id="file-inp" style="display:none" onchange="uploadFile(event)">
      </div>
      <textarea id="mi" placeholder="Message Friday..." rows="1" onkeydown="handleKey(event)" oninput="ar(this)"></textarea>
      <button id="sb" onclick="sendMessage()">➤</button>
    </div>
    <div class="hints">
      <span class="hc" onclick="qp('Search: ')">🔍 Search</span>
      <span class="hc" onclick="qp('Remember that ')">🧠 Remember</span>
      <span class="hc" onclick="qp('Create a skill that ')">🛠️ Skill</span>
      <span class="hc" onclick="qp('Analyze this data: ')">📊 Analyze</span>
      <span class="hc" onclick="qp('Write code to ')">💻 Code</span>
      <span class="hc" onclick="qp('Schedule a task to ')">⚡ Automate</span>
      <span class="hc" onclick="qp('Scrape and read the content from: ')">🕷️ Scrape</span>
      <span class="hc" onclick="qp('Plan step by step how to ')">📋 Plan</span>
    </div>
  </div>
</div>
<div class="drop-ov" id="drop-ov">📎 Drop file to upload</div>
<div id="toast"></div>
<script>
const B = window.FRIDAY_BACKEND || 'https://agii-v10-backend.onrender.com';
let sid = null, streaming = false, ws = null;
const icons = {web_search:'🌐',scrape_url:'🕷️',calculate:'🧮',execute_code:'⚡',remember:'🧠',recall:'💭',forget:'🗑️',create_skill:'🛠️',run_skill:'▶️',list_skills:'📋',analyze_data:'📊',generate_plan:'📋',create_automation:'⏰',multi_search:'🔍',reason:'🔬',get_current_time:'🕐',read_file:'📄',save_knowledge:'📚'};

async function init(){
  await newSession();
  loadStats(); loadSide();
  setInterval(loadStats,10000); setInterval(loadSide,15000);
  setupWS();
  marked.setOptions({breaks:true,gfm:true});
}

async function loadStats(){
  try{const r=await fetch(B+'/stats');const d=await r.json();
  document.getElementById('s-msgs').textContent=d.totalMessages||0;
  document.getElementById('s-tools').textContent=d.totalToolCalls||0;
  document.getElementById('s-mem').textContent=d.memories||0;
  document.getElementById('s-skills').textContent=d.skills||0;}catch{}
}

function setupWS(){
  try{
    const u=B.replace('https://','wss://').replace('http://','ws://');
    ws=new WebSocket(u);
    ws.onopen=()=>document.getElementById('s-dot').style.background='#10b981';
    ws.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==='automation_ran')toast('⚡ '+d.data.name+' ran');};
    ws.onclose=()=>{document.getElementById('s-dot').style.background='#f59e0b';setTimeout(setupWS,5000);};
    ws.onerror=()=>{};
  }catch{}
}

async function newSession(){
  const model=document.getElementById('model-sel').value;
  try{
    const r=await fetch(B+'/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,title:'New Conversation'})});
    const s=await r.json();sid=s.id;
    document.getElementById('messages').style.display='none';
    document.getElementById('messages').innerHTML='';
    document.getElementById('welcome').style.display='flex';
    document.getElementById('session-label').textContent='New Conversation';
    loadSessionList();
  }catch(e){toast('⚠️ Backend offline');}
}

async function loadSessionList(){
  try{
    const r=await fetch(B+'/sessions');const list=await r.json();
    const el=document.getElementById('session-list');el.innerHTML='';
    if(!list.length){el.innerHTML='<div style="color:var(--text3);font-size:11px;padding:12px;text-align:center">No sessions yet</div>';return;}
    list.forEach(s=>{
      const d=document.createElement('div');d.className='si-item'+(s.id===sid?' active':'');
      d.innerHTML='<span style="font-size:13px">💬</span><div style="flex:1;min-width:0"><div class="si-title">'+esc(s.title)+'</div><div class="si-time">'+ago(s.updatedAt)+' · '+s.messageCount+' msgs</div></div><button class="si-del" onclick="delSess(event,\''+s.id+'\')">✕</button>';
      d.onclick=e=>{if(!e.target.classList.contains('si-del'))loadSess(s.id);};
      el.appendChild(d);
    });
  }catch{}
}

async function loadSess(id){
  try{
    const r=await fetch(B+'/sessions/'+id);const s=await r.json();sid=id;
    document.getElementById('messages').style.display='flex';
    document.getElementById('welcome').style.display='none';
    document.getElementById('messages').innerHTML='';
    document.getElementById('session-label').textContent=s.title;
    document.getElementById('model-sel').value=s.model||'llama-3.3-70b-versatile';
    s.messages.filter(m=>m.role!=='system').forEach(m=>{
      if(m.role==='user')addUserMsg(m.content);
      else if(m.role==='assistant')addAsstMsg(m.content);
    });
    scroll();loadSessionList();
  }catch{}
}

async function delSess(e,id){
  e.stopPropagation();
  await fetch(B+'/sessions/'+id,{method:'DELETE'});
  if(id===sid)await newSession();else loadSessionList();
}

async function sendMessage(){
  if(streaming||!sid)return;
  const inp=document.getElementById('mi');const msg=inp.value.trim();if(!msg)return;
  inp.value='';ar(inp);
  document.getElementById('welcome').style.display='none';
  document.getElementById('messages').style.display='flex';
  document.getElementById('sb').disabled=true;streaming=true;
  addUserMsg(msg);
  const ab=makeAsstBubble();const ce=ab.querySelector('.mc');const te=ab.querySelector('.mt');
  let raw='';
  try{
    const r=await fetch(B+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,message:msg,model:document.getElementById('model-sel').value})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.type==='token'){raw+=ev.content;ce.innerHTML=marked.parse(raw);hljs.highlightAll();scroll();}
          else if(ev.type==='tool_start'){addTool(te,ev.tool,false);}
          else if(ev.type==='tool_done'){updTool(te,ev.tool,true);}
          else if(ev.type==='done'){if(!raw)ce.innerHTML='<em style="color:var(--text3)">No response</em>';loadSide();loadSessionList();loadStats();document.getElementById('session-label').textContent=msg.substring(0,40)+(msg.length>40?'...':'')}
        }catch{}
      }
    }
  }catch(e){ce.innerHTML='<span style="color:var(--red)">⚠️ '+esc(e.message)+'</span>';}
  streaming=false;document.getElementById('sb').disabled=false;document.getElementById('mi').focus();
}

function addUserMsg(t){
  const m=document.getElementById('messages');const d=document.createElement('div');
  d.className='msg user';d.innerHTML='<div class="av">👤</div><div class="bubble">'+esc(t)+'</div>';
  m.appendChild(d);scroll();
}

function addAsstMsg(t){
  const m=document.getElementById('messages');const d=document.createElement('div');
  d.className='msg assistant';
  d.innerHTML='<div class="av">F</div><div style="flex:1;max-width:75%"><div class="bubble"><div>'+marked.parse(t)+'</div></div></div>';
  m.appendChild(d);hljs.highlightAll();
}

function makeAsstBubble(){
  const m=document.getElementById('messages');const d=document.createElement('div');
  d.className='msg assistant';
  d.innerHTML='<div class="av">F</div><div style="flex:1;min-width:0;max-width:75%"><div class="mt"></div><div class="bubble"><div class="mc"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div></div>';
  m.appendChild(d);scroll();return d;
}

function addTool(c,name,done){
  const d=document.createElement('div');d.className='t-ind'+(done?' done':'');d.setAttribute('data-t',name);
  d.innerHTML='<span>'+( icons[name]||'🔧')+'</span><span class="t-name">'+name.replace(/_/g,' ')+'</span><span style="color:var(--text3)">''+(done?'✓':'...')+'</span>';
  c.appendChild(d);
}

function updTool(c,name,done){
  const ex=c.querySelector('[data-t="'+name+'"]');
  if(ex){ex.className='t-ind done';ex.querySelector('span:last-child').textContent='✓';}
  else addTool(c,name,done);
}

function loadSide(){loadSessionList();loadMem();loadSkills();loadAutos();}

async function loadMem(){
  try{const r=await fetch(B+'/memory');const d=await r.json();
  const el=document.getElementById('memory-list');
  if(!d.memories?.length){el.innerHTML='<div class="empty-st"><div class="ei">🧠</div>No memories yet</div>';return;}
  el.innerHTML=d.memories.map(m=>'<div class="p-item"><div class="p-item-info"><div class="p-item-name">'+esc(m.key)+'</div><div class="p-item-desc">'+esc(m.value)+'</div></div><span class="badge '+(m.importance==='critical'?'b-p':m.importance==='high'?'b-g':'b-y')+'">'+( m.importance||'med')+'</span><button class="del-btn" onclick="delMem(\'"+esc(m.key)+"\')">🗑️</button></div>').join('');}catch{}
}
async function loadSkills(){
  try{const r=await fetch(B+'/skills');const d=await r.json();
  const el=document.getElementById('skills-list');
  if(!d.skills?.length){el.innerHTML='<div class="empty-st"><div class="ei">🛠️</div>No skills yet<br><small>Ask Friday to create one</small></div>';return;}
  el.innerHTML=d.skills.map(s=>'<div class="p-item"><div class="p-item-info"><div class="p-item-name">'+esc(s.name)+'</div><div class="p-item-desc">'+esc(s.description)+'</div></div><span class="badge b-p">×'+( s.runCount||0)+'</span><button class="del-btn" onclick="delSkill(\'"+esc(s.name)+"\')">🗑️</button></div>').join('');}catch{}
}
async function loadAutos(){
  try{const r=await fetch(B+'/automations');const d=await r.json();
  const el=document.getElementById('auto-list');
  if(!d.automations?.length){el.innerHTML='<div class="empty-st"><div class="ei">⚡</div>No automations<br><small>Ask Friday to schedule a task</small></div>';return;}
  el.innerHTML=d.automations.map(a=>'<div class="p-item"><div class="p-item-info"><div class="p-item-name">'+esc(a.name)+'</div><div class="p-item-desc">'+esc(a.schedule)+' · '+( a.runCount||0)+'× ran</div></div><span class="badge '+(a.active?'b-g':'b-y')+'">'+( a.active?'active':'paused')+'</span><button class="del-btn" onclick="delAuto(\'"+a.id+"\')">🗑️</button></div>').join('');}catch{}
}
async function delMem(k){await fetch(B+'/memory/'+encodeURIComponent(k),{method:'DELETE'});loadMem();loadStats();}
async function delSkill(n){await fetch(B+'/skills/'+encodeURIComponent(n),{method:'DELETE'});loadSkills();}
async function delAuto(id){await fetch(B+'/automations/'+id,{method:'DELETE'});loadAutos();}

async function uploadFile(ev){
  const f=ev.target.files[0];if(!f)return;
  const t=await f.text();
  try{const r=await fetch(B+'/files',{method:'POST',headers:{'Content-Type':'text/plain','X-Filename':f.name},body:t});const d=await r.json();
  toast('📎 Uploaded: '+f.name);document.getElementById('mi').value='I uploaded "'+f.name+'" (ID: '+d.id+'). Please read and analyze it.';ar(document.getElementById('mi'));}catch{toast('⚠️ Upload failed');}
}

document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('drop-ov').classList.add('active');});
document.addEventListener('dragleave',()=>document.getElementById('drop-ov').classList.remove('active'));
document.addEventListener('drop',async e=>{
  e.preventDefault();document.getElementById('drop-ov').classList.remove('active');
  const f=e.dataTransfer.files[0];if(!f)return;
  const t=await f.text();
  const r=await fetch(B+'/files',{method:'POST',headers:{'Content-Type':'text/plain','X-Filename':f.name},body:t});
  const d=await r.json();toast('📎 Dropped: '+f.name);
  document.getElementById('mi').value='Analyze the file I uploaded: "'+f.name+'" (ID: '+d.id+')';ar(document.getElementById('mi'));
});

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function scroll(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function qp(t){document.getElementById('mi').value=t;document.getElementById('mi').focus();ar(document.getElementById('mi'));}
function switchTab(tab){
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}
function toggleSidebar(){
  const s=document.getElementById('sidebar');
  if(window.innerWidth<=700)s.classList.toggle('open');
  else s.classList.toggle('collapsed');
}
function ago(d){const diff=Date.now()-new Date(d);if(diff<60000)return'now';if(diff<3600000)return Math.floor(diff/60000)+'m';if(diff<86400000)return Math.floor(diff/3600000)+'h';return Math.floor(diff/86400000)+'d';}

init();
<\/script>
