services:
  - type: web
    name: agii-v10-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: agii-v10-frontend
    env: static
    rootDir: frontend
    buildCommand: echo "Static site"
    staticPublishPath: .
