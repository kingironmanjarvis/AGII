services:
  - type: web
    name: agii-v10-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: agii-v10-frontend
    env: static
    rootDir: frontend
    staticPublishPath: .
